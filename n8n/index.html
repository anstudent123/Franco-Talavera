<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Automatización</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .success { background: #d4edda; color: #155724; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .loading { background: #e2e3e5; color: #383d41; padding: 10px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Contacto</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" rows="5" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar mensaje</button>
    </form>
    <div id="respuesta"></div>

    <script>
        const form = document.getElementById('contactForm');
        const respuestaDiv = document.getElementById('respuesta');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            respuestaDiv.innerHTML = 'Enviando...';
            respuestaDiv.className = 'loading';

            try {
                const response = await fetch('https://utterless-tangly-reita.ngrok-free.dev/webhook/enviar-mensaje', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Leer la respuesta como texto primero (más seguro)
                const text = await response.text();
                let result;
                try {
                    result = JSON.parse(text);
                } catch (e) {
                    // Si no es JSON, usamos un objeto genérico
                    result = { status: 'unknown', message: text || 'Respuesta recibida' };
                }

                if (response.ok) {
                    respuestaDiv.innerHTML = 'Mensaje enviado correctamente';
                    respuestaDiv.className = 'success';
                    form.reset();
                } else {
                    respuestaDiv.innerHTML = 'Error: ' + (result.message || 'Código ' + response.status);
                    respuestaDiv.className = 'error';
                }
            } catch (error) {
                respuestaDiv.innerHTML = 'Error de conexión: ' + error.message;
                respuestaDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
